<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Travel Tetris</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="era-1">
    <div id="game-container">
        <div id="header">
            <h1 id="era-title">Era: Pré-História</h1>
            <div id="clock">00:00:00</div>
        </div>

        <div id="content">
            <div id="info">
                <div class="info-box">Pontuação<br><span id="score">0</span></div>
                <div class="info-box">Recorde<br><span id="highscore">0</span></div>
                <div class="info-box">Nível<br><span id="level">1</span></div>
                <div class="info-box">Próxima<br>
                    <canvas id="next-canvas" width="80" height="80"></canvas>
                </div>
            </div>

            <div id="game-board-container">
                <canvas id="tetris" width="240" height="400"></canvas>
                <div id="game-over-overlay" class="hidden">
                    <div id="game-over-content">
                        <h2>FIM DE JOGO</h2>
                        <p>Sua Pontuação: <span id="final-score">0</span></p>
                        <p>Recorde: <span id="final-highscore">0</span></p>
                        <button id="btn-restart">RECOMEÇAR</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="controls">
            <button id="btn-left">←</button>
            <button id="btn-rotate">↻</button>
            <button id="btn-right">→</button>
            <button id="btn-down">↓</button>
        </div>

        <footer id="footer">
            <a href="https://github.com/MarianaSouza" target="_blank" id="github-link">
                <svg height="24" width="24" viewBox="0 0 16 16" fill="currentColor">
                    <path
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z">
                    </path>
                </svg>
                GitHub Profile
            </a>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
